<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Webinars · UPSA</title>
<style>
  :root {
    --amarillo: #FCC132; --amarillo-deep: #E0A91C; --amarillo-soft: #FEF3D6;
    --gris: #5A5C60; --gris-deep: #3E4044;
    --ink: #2c2e31; --ink-soft: #6c6e72; --paper: #faf9f6; --line: #e6e3da;
    --pend: #b5651d; --proc: #4a6fa5; --done: #3e7d5a;
    --pend-bg: #fbf0e3; --proc-bg: #eaf0f7; --done-bg: #e8f3ec;
    --shadow: 0 1px 3px rgba(44,46,49,.07), 0 10px 28px rgba(44,46,49,.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--ink); background: var(--paper); min-height: 100vh; line-height: 1.5; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 22px 80px; }

  .masthead { background: var(--gris); color: #fff; padding: 26px 0 24px; }
  .masthead .wrap { padding-bottom: 0; }
  .mast-top { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .mast-logo { height: 52px; width: auto; flex-shrink: 0; }
  .mast-divider { width: 1px; height: 46px; background: rgba(255,255,255,.25); }
  .mast-text .tag { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; font-weight: 600; color: var(--amarillo); }
  .mast-text h1 { font-family: Georgia, serif; font-size: 26px; font-weight: 700; letter-spacing: -.01em; margin-top: 3px; }
  .masthead .sub { color: rgba(255,255,255,.72); font-size: 13.5px; margin-top: 14px; max-width: 640px; }
  .mast-status { display: inline-flex; align-items: center; gap: 7px; margin-top: 12px; font-size: 12px; font-weight: 600; background: rgba(255,255,255,.12); padding: 5px 12px; border-radius: 20px; color: #fff; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #9fb3a0; }
  .dot.on { background: #7fd49a; } .dot.off { background: #e0a05a; } .dot.err { background: #e08080; }

  .tabs-bar { background: #fff; border-bottom: 2px solid var(--amarillo); position: sticky; top: 0; z-index: 20; }
  .tabs-inner { max-width: 1080px; margin: 0 auto; padding: 0 22px; display: flex; align-items: stretch; gap: 2px; overflow-x: auto; }
  .tab { border: none; background: none; cursor: pointer; padding: 14px 18px; font-size: 14px; font-weight: 500; color: var(--ink-soft); border-bottom: 3px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 8px; font-family: inherit; margin-bottom: -2px; }
  .tab:hover { color: var(--gris-deep); }
  .tab.active { color: var(--gris-deep); border-bottom-color: var(--amarillo); font-weight: 600; }
  .tab .pct { font-size: 11px; background: var(--paper); border: 1px solid var(--line); border-radius: 20px; padding: 1px 8px; font-weight: 600; color: var(--ink-soft); }
  .tab.active .pct { background: var(--amarillo); color: var(--gris-deep); border-color: var(--amarillo); }
  .tab.vetoed .pct { background: var(--done); color: #fff; border-color: var(--done); }
  .tab-add { border: none; background: none; cursor: pointer; font-family: inherit; padding: 14px 16px; font-size: 20px; color: var(--ink-soft); line-height: 1; }
  .tab-add:hover { color: var(--amarillo-deep); }

  .web-head { padding-top: 28px; }
  .web-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .web-title { font-family: Georgia, serif; font-size: 26px; font-weight: 700; color: var(--gris-deep); border: 1px solid transparent; border-radius: 6px; padding: 2px 8px; margin-left: -8px; background: none; cursor: text; max-width: 100%; }
  .web-title:hover { border-color: var(--line); }
  .web-title:focus { outline: none; border-color: var(--amarillo); background: #fff; }
  .web-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 10px; font-size: 13px; color: var(--ink-soft); }
  .web-meta label { font-weight: 600; color: var(--gris); margin-right: 6px; }
  .web-meta input { border: none; border-bottom: 1px solid var(--line); background: none; font-family: inherit; font-size: 13px; color: var(--ink); padding: 2px 4px; min-width: 130px; }
  .web-meta input:focus { outline: none; border-bottom-color: var(--amarillo-deep); }

  .progress-block { margin: 22px 0 8px; }
  .progress-track { height: 10px; background: var(--line); border-radius: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--amarillo-deep), var(--amarillo)); border-radius: 20px; transition: width .4s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-soft); margin-top: 8px; }

  .areas { margin-top: 18px; display: grid; gap: 18px; }
  .area { background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .area-head { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fcfbf8; }
  .area-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .area-name { font-weight: 700; font-size: 15px; color: var(--gris-deep); padding: 2px 6px; }
  .area-count { font-size: 12px; color: var(--ink-soft); margin-left: auto; }

  .task { display: flex; align-items: flex-start; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #f1efe8; }
  .task:last-child { border-bottom: none; }
  .task-status { border: 1px solid var(--line); border-radius: 6px; font-family: inherit; font-size: 12px; font-weight: 600; padding: 5px 10px; cursor: pointer; flex-shrink: 0; min-width: 104px; text-align: center; }
  .status-pendiente { background: var(--pend-bg); color: var(--pend); border-color: #ecd9c2; }
  .status-proceso { background: var(--proc-bg); color: var(--proc); border-color: #d4e0ef; }
  .status-hecho { background: var(--done-bg); color: var(--done); border-color: #c9e4d4; }
  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; color: var(--ink); padding: 3px 0; word-break: break-word; }
  .task-text.is-done { text-decoration: line-through; color: var(--ink-soft); }
  .task-sub { display: flex; gap: 14px; margin-top: 6px; flex-wrap: wrap; }
  .task-sub input { border: none; border-bottom: 1px solid var(--line); background: none; font-family: inherit; font-size: 12px; color: var(--ink-soft); padding: 2px 2px; }
  .task-sub input:focus { outline: none; border-bottom-color: var(--amarillo-deep); color: var(--ink); }
  .task-sub .resp { min-width: 120px; }
  .task-sub .note { min-width: 180px; flex: 1; }

  .sec-head { font-family: Georgia, serif; font-size: 19px; font-weight: 700; color: var(--gris-deep); margin: 36px 0 14px; display: flex; align-items: center; gap: 10px; }
  .sec-head::before { content: ''; width: 4px; height: 20px; background: var(--amarillo); border-radius: 2px; }

  .repo { background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); }
  .repo-item { display: flex; align-items: center; gap: 12px; padding: 13px 18px; border-bottom: 1px solid #f1efe8; }
  .repo-item:last-of-type { border-bottom: none; }
  .repo-label { font-weight: 600; font-size: 13px; min-width: 150px; color: var(--gris); padding: 3px 0; }
  .repo-url { flex: 1; border: none; border-bottom: 1px solid var(--line); background: none; font-family: inherit; font-size: 13px; color: var(--proc); padding: 4px 2px; min-width: 0; }
  .repo-url:focus { outline: none; border-bottom-color: var(--amarillo-deep); }
  .repo-open { text-decoration: none; font-size: 12px; font-weight: 600; color: var(--gris-deep); background: var(--amarillo); padding: 5px 12px; border-radius: 6px; white-space: nowrap; }
  .repo-open.off { background: var(--line); color: var(--ink-soft); pointer-events: none; }

  .veto { margin-top: 36px; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); box-shadow: var(--shadow); }
  .veto-head { padding: 16px 20px; background: #fcfbf8; border-bottom: 1px solid var(--line); }
  .veto-head h3 { font-family: Georgia, serif; font-size: 18px; color: var(--gris-deep); }
  .veto-head p { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
  .veto-body { padding: 20px; }
  .veto.approved { border-color: var(--done); }
  .veto.approved .veto-head { background: var(--done-bg); border-bottom-color: #c9e4d4; }
  .veto-controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .veto-btn { border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px; padding: 12px 22px; border-radius: 8px; color: #fff; background: var(--done); }
  .veto-btn:hover { filter: brightness(1.07); }
  .veto-btn.revoke { background: var(--gris); }
  .veto-warn { font-size: 13px; color: var(--pend); font-weight: 500; }
  .veto-stamp { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--done); font-weight: 600; }
  .veto-stamp .seal { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--done); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .veto-by { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; max-width: 360px; }
  .veto-by input { border: 1px solid var(--line); border-radius: 7px; font-family: inherit; font-size: 13px; padding: 9px 11px; background: #fff; }
  .veto-by input:focus { outline: none; border-color: var(--amarillo-deep); }

  .web-tools { display: flex; gap: 8px; margin-left: auto; }
  .tool-btn { border: 1px solid var(--line); background: #fff; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--ink-soft); padding: 7px 12px; border-radius: 7px; }
  .tool-btn:hover { border-color: var(--amarillo-deep); color: var(--gris-deep); }

  .save-hint { position: fixed; bottom: 18px; right: 18px; background: var(--gris-deep); color: #fff; font-size: 12px; padding: 8px 14px; border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50; }
  .save-hint.show { opacity: .94; }

  .setup { max-width: 640px; margin: 60px auto; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 32px; box-shadow: var(--shadow); }
  .setup h2 { font-family: Georgia, serif; color: var(--gris-deep); margin-bottom: 10px; }
  .setup p { font-size: 14px; color: var(--ink-soft); margin-bottom: 18px; }
  .setup code { background: var(--amarillo-soft); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .loading { text-align: center; padding: 80px 20px; color: var(--ink-soft); }

  @media (max-width: 640px) { .masthead h1 { font-size: 22px; } .mast-logo { height: 42px; } .task { flex-wrap: wrap; } .repo-label { min-width: 110px; } }
</style>
</head>

5IhzNvUA43Udh+CvqTOzmKZ2OUCyFiFG3U68fJrLyxjaVQhaqEn9q0b5fnm86942CL6aLhWRn6O2VABTJVXSUkDi8XdX2vD8EJFuxQbIup1o25Z3Bo6FMhQv807xsuDKKUXWxQzyIaq6S8xTq8xsJVXS0gGgJNLG7UpjxfFRSCYvtTOdqHcYVmeOU6zMR2Gfkq6CA0Jz+ex+KokmAaE4hNTLjDDr+1BRsqykSvoFAan/o/uOpPQV3a7c0kR2dbNpkX9miTzPq+rgClCqpEpadEkWJZACY7kbkEJwUrcfAhN7CoLb2wtE5Fsa1PYEsBYCY3sVBAdcyyK4ozUekyIw3WchMNDHIzhfG4kQS+sTAD+IyDT6FjoZwADyl94F8DcRecK1MbMoPAtUUiX90tP/A/k3WgDkd7UlAAAAAElFTkSuQmCC";
  const app = document.getElementById('app');
  const STATUSES = ['Pendiente', 'En proceso', 'Hecho'];
  const AREA_COLORS = ['#FCC132', '#5A5C60', '#4a6fa5', '#3e7d5a', '#b5651d', '#8a6db5'];

  let state = { webinars: [] };
  let active = 0;
  let sb = null;
  let conn = 'connecting';
  let saveTimer = null;
  const ROW_ID = 1; // documento unico compartido

  function uid() { return Math.random().toString(36).slice(2, 10); }

  function defaultAreas() {
    const mk = (name, color, tasks) => ({ id: uid(), name, color, tasks: tasks.map(t => ({ id: uid(), text: t, status: 'Pendiente', resp: '', note: '' })) });
    return [
      mk('Contenido', AREA_COLORS[0], ['Definir tema y enfoque del webinar','Confirmar ponente(s) y bio','Redactar guion / estructura de la sesion','Escribir descripcion y titular','Vincular con titulacion(es) objetivo (TOFU)']),
      mk('Creatividades', AREA_COLORS[1], ['Disenar banner principal','Plantillas para redes sociales','Cabecera y recursos para la landing','Plantilla de email','Subir creatividades al repositorio']),
      mk('Landing Page', AREA_COLORS[2], ['Montar la landing page','Redactar textos de la LP','Configurar formulario de inscripcion','Revisar en movil y enlaces','Publicar y pegar URL en repositorio']),
      mk('Difusion', AREA_COLORS[3], ['Calendario de publicaciones','Envio de email marketing','Programar publicaciones en redes','Recordatorio a inscritos (24h antes)','Comunicacion interna UPSA']),
      mk('Tecnica', AREA_COLORS[4], ['Configurar plataforma de streaming','Ensayo tecnico con ponente','Grabacion de la sesion','Publicar grabacion post-evento'])
    ];
  }
  function newWebinar() {
    return { id: uid(), title: 'Nuevo webinar', date: '', time: '', owner: '', areas: defaultAreas(),
      repo: [ { id: uid(), label: 'Landing Page', url: '' }, { id: uid(), label: 'Carpeta de creatividades', url: '' }, { id: uid(), label: 'Grabacion', url: '' } ],
      veto: { approved: false, by: '', when: '' } };
  }

  function progress(w) { let total=0,done=0; w.areas.forEach(a=>a.tasks.forEach(t=>{total++;if(t.status==='Hecho')done++;})); return total?Math.round(done/total*100):0; }
  function statusClass(s){ if(s==='Hecho')return 'status-hecho'; if(s==='En proceso')return 'status-proceso'; return 'status-pendiente'; }
  function nextStatus(s){ const i=STATUSES.indexOf(s); return STATUSES[(i+1)%STATUSES.length]; }
  function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function escapeHtml(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

  // ---------- Conexion ----------
  function configured() { return SUPABASE_URL.indexOf('PEGA_AQUI') === -1 && SUPABASE_KEY.indexOf('PEGA_AQUI') === -1; }

  async function init() {
    if (!configured()) { renderSetup(); return; }
    try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      await pull();
      conn = 'on';
      subscribe();
      render();
    } catch (e) {
      console.error(e); conn = 'err'; render();
    }
  }

  async function pull() {
    const { data, error } = await sb.from('webinars_board').select('content').eq('id', ROW_ID).maybeSingle();
    if (error) throw error;
    if (data && data.content) {
      state = data.content;
    } else {
      state = { webinars: [newWebinar()] };
      await sb.from('webinars_board').upsert({ id: ROW_ID, content: state });
    }
    if (active >= state.webinars.length) active = 0;
  }

  function subscribe() {
    sb.channel('board')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'webinars_board', filter: 'id=eq.' + ROW_ID },
        payload => {
          if (payload.new && payload.new.content) {
            const focused = document.activeElement;
            const editing = focused && (focused.tagName === 'INPUT' || focused.isContentEditable);
            if (editing) return; // no pisar lo que el usuario escribe ahora
            state = payload.new.content;
            if (active >= state.webinars.length) active = 0;
            render();
          }
        }).subscribe();
  }

  function push() {
    conn = 'saving'; updateStatusBadge();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        const { error } = await sb.from('webinars_board').upsert({ id: ROW_ID, content: state, updated_at: new Date().toISOString() });
        if (error) throw error;
        conn = 'on'; showHint(); updateStatusBadge();
      } catch (e) { console.error(e); conn = 'err'; updateStatusBadge(); }
    }, 500);
  }

  let hintTimer = null;
  function showHint() {
    let h = document.querySelector('.save-hint');
    if (!h) { h = document.createElement('div'); h.className = 'save-hint'; h.textContent = 'Guardado para todos'; document.body.appendChild(h); }
    h.classList.add('show'); clearTimeout(hintTimer); hintTimer = setTimeout(() => h.classList.remove('show'), 1200);
  }
  function updateStatusBadge() {
    const b = document.querySelector('.mast-status'); if (!b) return;
    const map = { on:['dot on','Conectado · cambios en vivo'], saving:['dot off','Guardando...'], err:['dot err','Sin conexion'], connecting:['dot','Conectando...'] };
    const m = map[conn] || map.connecting;
    b.innerHTML = '<span class="' + m[0] + '"></span>' + m[1];
  }

  // ---------- Setup screen ----------
  function renderSetup() {
    app.innerHTML = '<div class="setup"><h2>Configuracion pendiente</h2>' +
      '<p>Para activar el modo compartido, abre este archivo con un editor de texto y pega tus credenciales de Supabase en las variables <code>SUPABASE_URL</code> y <code>SUPABASE_KEY</code>, al principio del bloque script. Sigue la guia de configuracion que acompana a este archivo.</p>' +
      '<p>Mientras tanto, no se guardan datos.</p></div>';
  }

  // ---------- Render ----------
  function render() {
    app.innerHTML = '';
    const mast = el('div', 'masthead');
    mast.innerHTML = '<div class="wrap"><div class="mast-top">' +
      '<img class="mast-logo" src="' + LOGO_WHITE + '" alt="Universidad Pontificia de Salamanca">' +
      '<div class="mast-divider"></div>' +
      '<div class="mast-text"><span class="tag">Departamento de Marketing</span><h1>Gestor de Webinars</h1></div>' +
      '</div><p class="sub">Coordinacion y seguimiento de las sesiones online. Todos veis y editais la misma informacion en tiempo real.</p>' +
      '<span class="mast-status"><span class="dot"></span>Conectando...</span></div>';
    app.appendChild(mast);
    updateStatusBadge();

    const tabsBar = el('div', 'tabs-bar');
    const tabsInner = el('div', 'tabs-inner');
    state.webinars.forEach((w, i) => {
      const t = el('button', 'tab' + (i === active ? ' active' : '') + (w.veto.approved ? ' vetoed' : ''));
      const pct = w.veto.approved ? 'OK vBo' : progress(w) + '%';
      t.innerHTML = '<span>' + escapeHtml(w.title || 'Sin titulo') + '</span><span class="pct">' + pct + '</span>';
      t.onclick = () => { active = i; render(); };
      tabsInner.appendChild(t);
    });
    const addTab = el('button', 'tab-add'); addTab.textContent = '+'; addTab.title = 'Nuevo webinar';
    addTab.onclick = () => { state.webinars.push(newWebinar()); active = state.webinars.length - 1; push(); render(); };
    tabsInner.appendChild(addTab); tabsBar.appendChild(tabsInner); app.appendChild(tabsBar);

    const wrap = el('div', 'wrap'); app.appendChild(wrap);
    const w = state.webinars[active]; if (!w) return;

    const head = el('div', 'web-head');
    const titleRow = el('div', 'web-title-row');
    const title = el('div', 'web-title'); title.contentEditable = true; title.spellcheck = false; title.textContent = w.title;
    title.onblur = () => { w.title = title.textContent.trim() || 'Sin titulo'; push(); render(); };
    title.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); title.blur(); } };
    titleRow.appendChild(title);

    const tools = el('div', 'web-tools');
    const dup = el('button', 'tool-btn'); dup.textContent = 'Duplicar';
    dup.onclick = () => { const copy = JSON.parse(JSON.stringify(w)); copy.id = uid(); copy.title = w.title + ' (copia)'; copy.veto = { approved: false, by: '', when: '' }; reId(copy); state.webinars.push(copy); active = state.webinars.length - 1; push(); render(); };
    tools.appendChild(dup); titleRow.appendChild(tools); head.appendChild(titleRow);

    const meta = el('div', 'web-meta');
    meta.appendChild(metaField('Fecha', 'date', w.date, v => { w.date = v; push(); }));
    meta.appendChild(metaField('Hora', 'time', w.time, v => { w.time = v; push(); }));
    meta.appendChild(metaField('Responsable', 'text', w.owner, v => { w.owner = v; push(); }, 'Nombre'));
    head.appendChild(meta); wrap.appendChild(head);

    const pb = el('div', 'progress-block'); const pct = progress(w);
    pb.innerHTML = '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-label"><span>Progreso general</span><span><strong>' + pct + '%</strong> completado</span></div>';
    wrap.appendChild(pb);

    const areasHead = el('div', 'sec-head'); areasHead.textContent = 'Checklist por areas'; wrap.appendChild(areasHead);
    const areas = el('div', 'areas'); w.areas.forEach(area => areas.appendChild(renderArea(w, area))); wrap.appendChild(areas);

    const repoHead = el('div', 'sec-head'); repoHead.textContent = 'Repositorio de enlaces y recursos'; wrap.appendChild(repoHead);
    wrap.appendChild(renderRepo(w));
    wrap.appendChild(renderVeto(w));
  }

  function renderArea(w, area) {
    const box = el('div', 'area');
    const ah = el('div', 'area-head');
    const dot = el('span', 'area-dot'); dot.style.background = area.color;
    const name = el('div', 'area-name'); name.textContent = area.name;
    const count = el('span', 'area-count'); const adone = area.tasks.filter(t => t.status === 'Hecho').length; count.textContent = adone + '/' + area.tasks.length;
    ah.append(dot, name, count); box.appendChild(ah);
    area.tasks.forEach(task => box.appendChild(renderTask(area, task)));
    return box;
  }

  function renderTask(area, task) {
    const row = el('div', 'task');
    const st = el('button', 'task-status ' + statusClass(task.status)); st.textContent = task.status;
    st.onclick = () => { task.status = nextStatus(task.status); push(); render(); }; row.appendChild(st);
    const body = el('div', 'task-body');
    const txt = el('div', 'task-text' + (task.status === 'Hecho' ? ' is-done' : '')); txt.textContent = task.text; body.appendChild(txt);
    const sub = el('div', 'task-sub');
    const resp = el('input', 'resp'); resp.placeholder = 'Responsable'; resp.value = task.resp; resp.oninput = () => { task.resp = resp.value; push(); };
    const note = el('input', 'note'); note.placeholder = 'Nota / observacion'; note.value = task.note; note.oninput = () => { task.note = note.value; push(); };
    sub.append(resp, note); body.appendChild(sub); row.appendChild(body);
    return row;
  }

  function renderRepo(w) {
    const repo = el('div', 'repo');
    w.repo.forEach(item => {
      const r = el('div', 'repo-item');
      const lab = el('div', 'repo-label'); lab.textContent = item.label;
      const url = el('input', 'repo-url'); url.placeholder = 'https://...'; url.value = item.url;
      const open = el('a', 'repo-open' + (item.url ? '' : ' off')); open.textContent = 'Abrir'; open.target = '_blank'; open.rel = 'noopener'; open.href = item.url || '#';
      url.oninput = () => { item.url = url.value.trim(); open.href = item.url || '#'; open.className = 'repo-open' + (item.url ? '' : ' off'); push(); };
      r.append(lab, url, open); repo.appendChild(r);
    });
    return repo;
  }

  function renderVeto(w) {
    const v = w.veto;
    const box = el('div', 'veto' + (v.approved ? ' approved' : ''));
    const h = el('div', 'veto-head');
    h.innerHTML = '<h3>Visto bueno para publicar</h3><p>El responsable marca aqui su revision final. Solo con el vBo se considera aprobado para publicar.</p>';
    box.appendChild(h);
    const body = el('div', 'veto-body'); const pct = progress(w);
    if (!v.approved) {
      const ctr = el('div', 'veto-controls');
      const btn = el('button', 'veto-btn'); btn.textContent = 'Dar visto bueno';
      btn.onclick = () => { v.approved = true; v.when = new Date().toLocaleString('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); push(); render(); };
      ctr.appendChild(btn);
      if (pct < 100) { const warn = el('span', 'veto-warn'); warn.textContent = 'Atencion: el checklist esta al ' + pct + '%. Puedes aprobar igualmente si procede.'; ctr.appendChild(warn); }
      body.appendChild(ctr);
      const by = el('div', 'veto-by'); const nameI = el('input'); nameI.placeholder = 'Revisado por (nombre)'; nameI.value = v.by; nameI.oninput = () => { v.by = nameI.value; push(); }; by.appendChild(nameI); body.appendChild(by);
    } else {
      const stamp = el('div', 'veto-stamp');
      stamp.innerHTML = '<div class="seal">OK</div><div><div>Aprobado para publicar' + (v.by ? ' - ' + escapeHtml(v.by) : '') + '</div><div style="font-weight:400;color:var(--ink-soft);font-size:13px;">' + escapeHtml(v.when || '') + '</div></div>';
      body.appendChild(stamp);
      const revoke = el('button', 'veto-btn revoke'); revoke.textContent = 'Revocar visto bueno'; revoke.style.marginTop = '16px';
      revoke.onclick = () => { if (confirm('Revocar el visto bueno?')) { v.approved = false; v.when = ''; push(); render(); } };
      body.appendChild(revoke);
    }
    box.appendChild(body); return box;
  }

  function metaField(label, type, value, onInput, ph) {
    const span = el('span'); span.innerHTML = '<label>' + label + ':</label>';
    const inp = el('input'); inp.type = type; inp.value = value || ''; if (ph) inp.placeholder = ph; inp.oninput = () => onInput(inp.value); span.appendChild(inp); return span;
  }
  function reId(w) { w.areas.forEach(a => { a.id = uid(); a.tasks.forEach(t => t.id = uid()); }); w.repo.forEach(r => r.id = uid()); }

  init();
})();
</script>
</body>
</html>
